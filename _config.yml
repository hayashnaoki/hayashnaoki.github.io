# Site title (shown in header and browser tab)
title: Naoki Hayashi

# Pages to show in the top navigation
header_pages:
  - docs/projects.md
  - docs/lab.md
  - docs/about.md

# Make local preview match GitHub Pages exactly
# baseurl: "/portfolio"

# Jekyll theme
theme: minima

# Theme settings
minima:
  skin: auto

# Custom head content (for favicon)
head:
  - <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">

# Markdown engine
markdown: kramdown

# Markdown + syntax highlighting settings
kramdown:
  input: GFM            # GitHub Flavored Markdown
  syntax_highlighter: rouge  # Code highlighting engine
